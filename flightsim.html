<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Mouse Flight Sim - Multi-Plane</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* Hide scrollbars */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
        }
        canvas {
            border: 1px solid black;
            background-color: #87CEEB; /* Sky Blue */
            cursor: crosshair; /* Indicate interactive area */
        }
    </style>
</head>
<body>
    <canvas id="flightCanvas"></canvas>

    <script>
        const canvas = document.getElementById('flightCanvas');
        const ctx = canvas.getContext('2d');

        // --- Configuration ---
        const PLANE_SIZE = 20;
        const PLANE_SPEED = 2; // Pixels per frame
        const TURN_RATE = 0.05; // Radians per frame (how quickly it turns)

        // --- State Variables ---
        let planes = []; // Use an array to hold multiple planes
        let mouse = {
            x: 0,
            y: 0
        };

        // --- Canvas Setup ---
        function resizeCanvas() {
            canvas.width = window.innerWidth * 0.9;
            canvas.height = window.innerHeight * 0.9;
            // Re-initialize planes on resize (start with one centered plane)
            initializePlanes();
            mouse.x = canvas.width / 2;
            mouse.y = canvas.height / 2; // Start mouse target at center
        }

        // --- Initialize Planes ---
        function initializePlanes() {
            planes = []; // Clear existing planes
            // Start with one plane in the center
            addPlane(canvas.width / 2, canvas.height / 2);
        }

        // --- Add a Plane ---
        function addPlane(startX, startY) {
             planes.push({
                x: startX,
                y: startY,
                angle: Math.random() * Math.PI * 2, // Start with a random angle
                targetAngle: 0 // Will be updated immediately
            });
        }


        // --- Event Listeners ---
        function handleMouseMove(event) {
            const rect = canvas.getBoundingClientRect();
            mouse.x = event.clientX - rect.left;
            mouse.y = event.clientY - rect.top;
        }

        function handleMouseClick(event) {
            const rect = canvas.getBoundingClientRect();
            const clickX = event.clientX - rect.left;
            const clickY = event.clientY - rect.top;
            addPlane(clickX, clickY); // Add a new plane at the click location
        }


        // --- Update Logic ---
        function update() {
            // Update each plane individually
            for (let i = 0; i < planes.length; i++) {
                let currentPlane = planes[i];

                // 1. Calculate target angle towards the mouse
                const dx = mouse.x - currentPlane.x;
                const dy = mouse.y - currentPlane.y;
                // Avoid division by zero or NaN if mouse is exactly on plane
                if (dx !== 0 || dy !== 0) {
                    currentPlane.targetAngle = Math.atan2(dy, dx); // Radians
                }


                // 2. Smoothly turn towards the target angle
                let angleDiff = currentPlane.targetAngle - currentPlane.angle;

                // Normalize angle difference to be between -PI and PI
                while (angleDiff > Math.PI) angleDiff -= 2 * Math.PI;
                while (angleDiff < -Math.PI) angleDiff += 2 * Math.PI;

                // Apply turn rate
                if (Math.abs(angleDiff) > TURN_RATE) {
                    currentPlane.angle += Math.sign(angleDiff) * TURN_RATE;
                } else {
                    currentPlane.angle = currentPlane.targetAngle; // Snap if close enough
                }

                // Keep angle within 0 to 2*PI range (optional, but cleaner)
                currentPlane.angle = (currentPlane.angle + 2 * Math.PI) % (2 * Math.PI);

                // 3. Move the plane forward
                currentPlane.x += Math.cos(currentPlane.angle) * PLANE_SPEED;
                currentPlane.y += Math.sin(currentPlane.angle) * PLANE_SPEED;

                // 4. Basic boundary collision (wrap around)
                if (currentPlane.x < -PLANE_SIZE) currentPlane.x = canvas.width + PLANE_SIZE; // Adjust wrap buffer
                if (currentPlane.x > canvas.width + PLANE_SIZE) currentPlane.x = -PLANE_SIZE;
                if (currentPlane.y < -PLANE_SIZE) currentPlane.y = canvas.height + PLANE_SIZE;
                if (currentPlane.y > canvas.height + PLANE_SIZE) currentPlane.y = -PLANE_SIZE;
            }
        }

        // --- Drawing Logic ---
        function draw() {
            // 1. Clear canvas (sky blue background is set via CSS)
            ctx.clearRect(0, 0, canvas.width, canvas.height);

             // Optional: Draw simple ground
             ctx.fillStyle = '#228B22'; // Forest Green
             ctx.fillRect(0, canvas.height * 0.8, canvas.width, canvas.height * 0.2);

            // 2. Draw all the planes
            for (let i = 0; i < planes.length; i++) {
                let currentPlane = planes[i];

                ctx.save(); // Save current state (position, rotation)
                ctx.translate(currentPlane.x, currentPlane.y); // Move origin to plane's position
                ctx.rotate(currentPlane.angle); // Rotate coordinate system

                // Draw triangle centered around the new origin
                ctx.fillStyle = '#A9A9A9'; // Dark Gray
                ctx.strokeStyle = '#000000'; // Black outline
                ctx.lineWidth = 1;
                ctx.beginPath();
                // Nose
                ctx.moveTo(PLANE_SIZE * 0.75, 0);
                // Wing back left
                ctx.lineTo(-PLANE_SIZE * 0.5, -PLANE_SIZE * 0.4);
                // Tail center
                ctx.lineTo(-PLANE_SIZE * 0.25, 0);
                // Wing back right
                ctx.lineTo(-PLANE_SIZE * 0.5, PLANE_SIZE * 0.4);
                ctx.closePath(); // Connect back to nose
                ctx.fill();
                ctx.stroke();

                ctx.restore(); // Restore original state
            } // End loop for drawing planes


            // Optional: Draw mouse target indicator
            ctx.fillStyle = 'rgba(255, 0, 0, 0.5)'; // Semi-transparent red
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 5, 0, 2 * Math.PI);
            ctx.fill();
        }

        // --- Game Loop ---
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop); // Ask browser to call this again smoothly
        }

        // --- Initialization ---
        resizeCanvas(); // Set initial canvas size and plane position
        window.addEventListener('resize', resizeCanvas); // Adjust if window size changes
        canvas.addEventListener('mousemove', handleMouseMove);
        canvas.addEventListener('click', handleMouseClick); // Add click listener

        // Start the simulation
        gameLoop();

    </script>
</body>
</html>

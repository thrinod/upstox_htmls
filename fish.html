<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fish Tank Game (Single File)</title>
    <style>
        /* CSS styles go here */
        body {
            display: flex;
            flex-direction: column; /* Stack elements vertically */
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Full viewport height */
            background-color: #e0f7fa; /* Light blue background */
            margin: 0;
            font-family: sans-serif;
        }

        h1 {
            color: #00796b; /* Teal color */
            margin-bottom: 10px;
        }

        .info-panel {
            background-color: #ffffff;
            padding: 10px 20px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            text-align: center;
        }

        .info-panel p {
            margin: 5px 0;
            color: #333;
        }

        #fishTankCanvas {
            border: 5px solid #004d40; /* Darker teal border */
            background-color: #b2ebf2; /* Lighter water color */
            display: block; /* Remove extra space below canvas */
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        /* Optional: Add a simple cursor */
        #fishTankCanvas:hover {
            cursor: crosshair;
        }
    </style>
</head>
<body>
    <h1>My Fish Tank</h1>
    <div class="info-panel">
        <p>Fish Count: <span id="fish-count">1</span></p>
        <p>Feeds Given: <span id="feed-count">0</span></p>
        <p>Click in the tank to feed!</p>
    </div>
    <canvas id="fishTankCanvas"></canvas>

    <script>
        // JavaScript code goes here

        const canvas = document.getElementById('fishTankCanvas');
        const ctx = canvas.getContext('2d');
        const fishCountDisplay = document.getElementById('fish-count');
        const feedCountDisplay = document.getElementById('feed-count');

        // --- Configuration ---
        const TANK_WIDTH = 800;
        const TANK_HEIGHT = 500;
        const FISH_SIZE = 25; // Average size factor
        const FOOD_SIZE = 4;
        const FOOD_SINK_SPEED = 0.8;
        const FEED_THRESHOLD = 10; // Feeds needed for a new fish
        const FISH_SPEED = 1.5; // Base speed factor
        const TURN_RATE = 0.05; // How quickly fish turn towards target

        canvas.width = TANK_WIDTH;
        canvas.height = TANK_HEIGHT;

        // --- Game State ---
        let fish = [];
        let foodPellets = [];
        let feedCount = 0;
        let animationFrameId = null; // To potentially stop the animation

        // --- Fish Class ---
        class Fish {
            constructor() {
                this.size = FISH_SIZE * (0.8 + Math.random() * 0.4); // Vary size slightly
                this.x = Math.random() * (TANK_WIDTH - this.size * 2) + this.size;
                this.y = Math.random() * (TANK_HEIGHT - this.size) + this.size / 2;
                this.color = `hsl(${Math.random() * 360}, 70%, 50%)`; // Random hue
                this.speed = FISH_SPEED * (0.7 + Math.random() * 0.6); // Vary speed

                // Target-based movement
                this.targetX = Math.random() * TANK_WIDTH;
                this.targetY = Math.random() * TANK_HEIGHT;
                this.angle = Math.random() * Math.PI * 2; // Initial direction
                this.facingRight = true;
            }

            setNewTarget() {
                this.targetX = Math.random() * TANK_WIDTH;
                this.targetY = Math.random() * TANK_HEIGHT;
            }

            update() {
                // Calculate distance and angle to target
                const dx = this.targetX - this.x;
                const dy = this.targetY - this.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const targetAngle = Math.atan2(dy, dx);

                // Smoothly turn towards the target angle
                let angleDiff = targetAngle - this.angle;
                // Normalize angle difference to [-PI, PI]
                while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;

                this.angle += angleDiff * TURN_RATE;

                // Move the fish
                this.x += Math.cos(this.angle) * this.speed;
                this.y += Math.sin(this.angle) * this.speed;

                // Update facing direction
                this.facingRight = Math.cos(this.angle) >= 0;

                // Check boundaries (simple wrap/reappear for variation, could use bounce)
                let changedTarget = false;
                if (this.x < -this.size) {
                     this.x = TANK_WIDTH + this.size / 2;
                     changedTarget = true;
                } else if (this.x > TANK_WIDTH + this.size) {
                     this.x = -this.size / 2;
                     changedTarget = true;
                }
                if (this.y < -this.size) {
                     this.y = TANK_HEIGHT + this.size / 2;
                     changedTarget = true;
                 } else if (this.y > TANK_HEIGHT + this.size) {
                     this.y = -this.size / 2;
                     changedTarget = true;
                 }

                 // Get a new target if close to the current one, randomly, or after wrapping
                 if (distance < this.size * 2 || Math.random() < 0.01 || changedTarget) {
                     this.setNewTarget();
                 }
            }

            draw(ctx) {
                ctx.save(); // Save current context state
                ctx.translate(this.x, this.y); // Move origin to fish position
                ctx.rotate(this.angle); // Rotate context to fish angle

                // Flip the drawing context vertically if facing left
                // Ensures the fish graphic always faces the direction of horizontal movement
                 if (!this.facingRight) {
                     ctx.scale(1, -1);
                 }

                // Draw fish body (Oval shape)
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.ellipse(0, 0, this.size / 1.5, this.size / 3, 0, 0, Math.PI * 2);
                ctx.fill();

                // Draw tail fin (Triangle shape)
                ctx.beginPath();
                ctx.moveTo(-this.size / 1.6, 0); // Point attached to body
                ctx.lineTo(-this.size / 1.6 - this.size / 3, -this.size / 3); // Top tail point
                ctx.lineTo(-this.size / 1.6 - this.size / 3, this.size / 3); // Bottom tail point
                ctx.closePath();
                ctx.fill();

                // Draw eye
                ctx.fillStyle = 'white';
                ctx.beginPath();
                ctx.arc(this.size / 3, 0, this.size / 10, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(this.size / 3 + this.size / 30, 0, this.size / 15, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore(); // Restore context state
            }
        }

        // --- Food Pellet Class ---
        class FoodPellet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.size = FOOD_SIZE;
                this.color = '#c68642'; // Brownish food color
                this.speedY = FOOD_SINK_SPEED;
                this.eaten = false; // Flag to mark if eaten
            }

            update() {
                if (!this.eaten) {
                    this.y += this.speedY;
                }
            }

            draw(ctx) {
                 if (!this.eaten) {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                 }
            }
        }

        // --- Game Functions ---
        function addFish() {
            fish.push(new Fish());
            updateScores();
        }

        function spawnFood(x, y) {
            foodPellets.push(new FoodPellet(x, y));
            // Note: Actual feeding/eating is not implemented here,
            // clicking just adds a pellet and increments the count.
            feedCount++;
            if (feedCount > 0 && feedCount % FEED_THRESHOLD === 0) {
                addFish();
            }
            updateScores();
        }

        function updateScores() {
            fishCountDisplay.textContent = fish.length;
            feedCountDisplay.textContent = feedCount;
        }

        function gameLoop() {
            // 1. Clear canvas
            ctx.clearRect(0, 0, TANK_WIDTH, TANK_HEIGHT);

            // 2. Update and Draw Food
            // Iterate backwards for safe removal while iterating
            for (let i = foodPellets.length - 1; i >= 0; i--) {
                const pellet = foodPellets[i];
                pellet.update(); // Update position (sinking)
                pellet.draw(ctx);

                // Remove food that sinks below the tank
                if (pellet.y > TANK_HEIGHT + pellet.size) {
                    foodPellets.splice(i, 1);
                }
            }

            // 3. Update and Draw Fish
            fish.forEach(f => {
                f.update();
                f.draw(ctx);
                // (Optional Enhancement: Check if fish is near food and "eat" it)
                // for (let i = foodPellets.length - 1; i >= 0; i--) {
                //    const pellet = foodPellets[i];
                //    if (!pellet.eaten) {
                //        const dx = pellet.x - f.x;
                //        const dy = pellet.y - f.y;
                //        const distance = Math.sqrt(dx*dx + dy*dy);
                //        if (distance < f.size / 1.5) { // If fish touches food
                //            pellet.eaten = true;
                //            foodPellets.splice(i, 1); // Remove eaten food immediately
                //            // You could add score logic here instead of on click
                //            break; // Fish eats one pellet per frame max
                //        }
                //    }
                // }
            });


            // 4. Request next frame
            animationFrameId = requestAnimationFrame(gameLoop);
        }

        // --- Event Listeners ---
        canvas.addEventListener('click', (event) => {
            const rect = canvas.getBoundingClientRect(); // Gets canvas position on page
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;
            spawnFood(mouseX, mouseY);
        });

        // --- Initial Setup ---
        addFish(); // Start with one fish
        updateScores(); // Show initial scores
        gameLoop(); // Start the animation

    </script>
</body>
</html>
